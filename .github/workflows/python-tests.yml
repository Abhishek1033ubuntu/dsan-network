name: DSAN Ecosystem Validation Suite

# Trigger this workflow every time someone pushes to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone the code from the repository onto the GitHub cloud server
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # Step 2: Deploy a clean environment running Python 3.11
    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # Step 3: Install dependencies (None needed for our base script, but listed for standard best practice)
    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip

    # Step 4: Execute the test framework across the repository core
    - name: Run Validation Engine Core Tests
      run: |
        python -m unittest tests/test_core.py